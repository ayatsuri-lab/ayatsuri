apiVersion: v1
kind: ConfigMap
metadata:
  name: ayatsuri-config
  namespace: ayatsuri-dev
data:
  # Coordinator gRPC port (host configured per-deployment)
  AYATSURI_COORDINATOR_PORT: "50055"

  # Server configuration
  AYATSURI_HOST: "0.0.0.0"
  AYATSURI_PORT: "8080"

  # Data directories
  AYATSURI_DAGS_DIR: "/var/lib/ayatsuri/dags"
  AYATSURI_HOME: "/var/lib/ayatsuri"

  # Peer configuration (insecure for local testing)
  AYATSURI_PEER_INSECURE: "true"

  # Optional: Timezone
  AYATSURI_TZ: "UTC"
