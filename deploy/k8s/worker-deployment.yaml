apiVersion: apps/v1
kind: Deployment
metadata:
  name: ayatsuri-worker
  namespace: ayatsuri-dev
  labels:
    app: ayatsuri
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ayatsuri
      component: worker
  template:
    metadata:
      labels:
        app: ayatsuri
        component: worker
    spec:
      containers:
      - name: ayatsuri
        # Use official latest image
        image: ghcr.io/ayatsuri-lab/ayatsuri:latest
        imagePullPolicy: IfNotPresent
        command:
          - ayatsuri
          - worker
          - --worker.labels
          - environment=dev,region=local,cluster=k8s
          # Uncomment to customize worker ID and max active runs:
          # - --worker.id
          # - $(WORKER_ID)
          # - --worker.max-active-runs
          # - "50"
        envFrom:
        - configMapRef:
            name: ayatsuri-config
        env:
        # Workers connect to coordinator via service DNS name
        - name: AYATSURI_COORDINATOR_HOST
          value: "ayatsuri-server"
        - name: WORKER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: ayatsuri-data
          mountPath: /var/lib/ayatsuri
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: ayatsuri-data
        persistentVolumeClaim:
          claimName: ayatsuri-data
