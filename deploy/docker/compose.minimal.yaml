services:
  ayatsuri:
    image: ghcr.io/ayatsuri-lab/ayatsuri:latest
    container_name: ayatsuri-dev
    hostname: ayatsuri-dev

    # Expose the web UI on localhost:8080
    ports:
      - "8080:8080"

    entrypoint: [] # Override any default entrypoint for Docker in Docker (DinD) support

    # Default command: run all-in-one (server + scheduler + coordinator in-process)
    # You may override this at runtime, e.g.:
    #   docker compose -f compose.dev.yaml run --rm ayatsuri ayatsuri server
    command: ["ayatsuri", "start-all"]

    # Recommended dev environment variables
    environment:
      # Frontend server
      - AYATSURI_HOST=0.0.0.0 # Bind inside container
      - AYATSURI_PORT=8080 # Web/UI port inside container
      - AYATSURI_DEBUG=true # More verbose logs during dev
      # Paths
      - AYATSURI_DAGS_DIR=/var/lib/ayatsuri/dags
      # Builtin authentication (RBAC) - CHANGE TOKEN_SECRET IN PRODUCTION
      - AYATSURI_AUTH_MODE=builtin
      # Token secret: auto-generated if not set (persisted to {dataDir}/auth/token_secret)
      # - AYATSURI_AUTH_TOKEN_SECRET=your-secure-random-secret
      # First admin account created via /setup page on first browser visit
      # - AYATSURI_AUTH_TOKEN_TTL=24h        # default is 24h
      # Timezone / base path (optional)
      # - AYATSURI_TZ=UTC
      # - AYATSURI_BASE_PATH=/ayatsuri
      # User and Group IDs (optional, for file permissions)
      # - PUID=1000 # optional. default is 1000
      # - PGID=1000 # optional. default is 1000

    # Dev-friendly mounts (persistent data + read-only DAGs)
    volumes:
      - ayatsuri-data:/var/lib/ayatsuri
      - ./dags:/var/lib/ayatsuri/dags:ro
      # For Docker in Docker (DinD) support, mount the host Docker socket:
      - /var/run/docker.sock:/var/run/docker.sock

    # Quick command presets (uncomment any one to run specific component):
    # command: ["ayatsuri", "server"]
    # command: ["ayatsuri", "scheduler"]
    # command: ["ayatsuri", "coordinator"]
    # command: ["ayatsuri", "worker"]

    # Alternative: basic auth (simpler, no user management)
    # To use basic auth instead of builtin auth, comment out
    # AYATSURI_AUTH_MODE and AYATSURI_AUTH_TOKEN_SECRET above, then uncomment:
    # environment:
    #   - AYATSURI_AUTH_BASIC_USERNAME=dev
    #   - AYATSURI_AUTH_BASIC_PASSWORD=devpass

    user: "0:0" # Run as root for Docker in Docker (DinD) support

volumes:
  ayatsuri-data:
    driver: local
