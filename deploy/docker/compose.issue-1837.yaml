name: ayatsuri-issue-1837

x-ayatsuri-env: &ayatsuri-env
  AYATSURI_HOME: /var/lib/ayatsuri
  AYATSURI_DATA_DIR: /var/lib/ayatsuri/data
  AYATSURI_LOG_DIR: /var/lib/ayatsuri/logs
  AYATSURI_DAGS_DIR: /var/lib/ayatsuri/dags
  AYATSURI_DEFAULT_EXECUTION_MODE: distributed
  AYATSURI_TZ: UTC
  AYATSURI_DEBUG: "true"
  AYATSURI_AUTH_MODE: basic
  AYATSURI_AUTH_BASIC_USERNAME: admin
  AYATSURI_AUTH_BASIC_PASSWORD: debug-password

x-ayatsuri-volumes: &ayatsuri-volumes
  - ./issue-1837/data:/var/lib/ayatsuri/data
  - ./issue-1837/logs:/var/lib/ayatsuri/logs
  - ./issue-1837/dags:/var/lib/ayatsuri/dags
  - ./issue-1837/config.yaml:/etc/ayatsuri/config.yaml:ro

x-ayatsuri-service: &ayatsuri-service
  image: ${AYATSURI_IMAGE:-ghcr.io/ayatsuri-lab/ayatsuri:2.3.6}
  init: true
  environment: *ayatsuri-env
  volumes: *ayatsuri-volumes

x-ayatsuri-worker-env: &ayatsuri-worker-env
  AYATSURI_HOME: /var/lib/ayatsuri
  AYATSURI_DATA_DIR: /var/lib/ayatsuri/data
  AYATSURI_LOG_DIR: /var/lib/ayatsuri/logs
  AYATSURI_DAGS_DIR: /var/lib/ayatsuri/dags
  AYATSURI_DEFAULT_EXECUTION_MODE: distributed
  AYATSURI_TZ: UTC
  AYATSURI_DEBUG: "true"
  AYATSURI_WORKER_COORDINATORS: coordinator-1:50055,coordinator-2:50055,coordinator-3:50055

x-ayatsuri-worker-volumes: &ayatsuri-worker-volumes
  - ./issue-1837/config.yaml:/etc/ayatsuri/config.yaml:ro

x-ayatsuri-worker-service: &ayatsuri-worker-service
  image: ${AYATSURI_IMAGE:-ghcr.io/ayatsuri-lab/ayatsuri:2.3.6}
  init: true
  environment: *ayatsuri-worker-env
  volumes: *ayatsuri-worker-volumes

services:
  ui:
    <<: *ayatsuri-service
    hostname: ui
    command: ["ayatsuri", "server", "--config", "/etc/ayatsuri/config.yaml"]
    environment:
      <<: *ayatsuri-env
      AYATSURI_HOST: 0.0.0.0
      AYATSURI_PORT: 8080
    depends_on:
      - scheduler-1
      - scheduler-2
      - scheduler-3
      - coordinator-1
      - coordinator-2
      - coordinator-3
    ports:
      - "8888:8080"

  scheduler-1:
    <<: *ayatsuri-service
    hostname: scheduler-1
    command: ["ayatsuri", "scheduler", "--config", "/etc/ayatsuri/config.yaml"]

  scheduler-2:
    <<: *ayatsuri-service
    hostname: scheduler-2
    command: ["ayatsuri", "scheduler", "--config", "/etc/ayatsuri/config.yaml"]

  scheduler-3:
    <<: *ayatsuri-service
    hostname: scheduler-3
    command: ["ayatsuri", "scheduler", "--config", "/etc/ayatsuri/config.yaml"]

  coordinator-1:
    <<: *ayatsuri-service
    hostname: coordinator-1
    command: ["ayatsuri", "coordinator", "--config", "/etc/ayatsuri/config.yaml"]
    environment:
      <<: *ayatsuri-env
      AYATSURI_COORDINATOR_HOST: 0.0.0.0
      AYATSURI_COORDINATOR_ADVERTISE: coordinator-1
    depends_on:
      - scheduler-1
      - scheduler-2
      - scheduler-3

  coordinator-2:
    <<: *ayatsuri-service
    hostname: coordinator-2
    command: ["ayatsuri", "coordinator", "--config", "/etc/ayatsuri/config.yaml"]
    environment:
      <<: *ayatsuri-env
      AYATSURI_COORDINATOR_HOST: 0.0.0.0
      AYATSURI_COORDINATOR_ADVERTISE: coordinator-2
    depends_on:
      - scheduler-1
      - scheduler-2
      - scheduler-3

  coordinator-3:
    <<: *ayatsuri-service
    hostname: coordinator-3
    command: ["ayatsuri", "coordinator", "--config", "/etc/ayatsuri/config.yaml"]
    environment:
      <<: *ayatsuri-env
      AYATSURI_COORDINATOR_HOST: 0.0.0.0
      AYATSURI_COORDINATOR_ADVERTISE: coordinator-3
    depends_on:
      - scheduler-1
      - scheduler-2
      - scheduler-3

  worker-1:
    <<: *ayatsuri-worker-service
    hostname: worker-1
    command: ["ayatsuri", "worker", "--config", "/etc/ayatsuri/config.yaml"]
    environment:
      <<: *ayatsuri-worker-env
      AYATSURI_WORKER_ID: worker-1
    depends_on:
      - coordinator-1
      - coordinator-2
      - coordinator-3
      - scheduler-1
      - scheduler-2
      - scheduler-3

  worker-2:
    <<: *ayatsuri-worker-service
    hostname: worker-2
    command: ["ayatsuri", "worker", "--config", "/etc/ayatsuri/config.yaml"]
    environment:
      <<: *ayatsuri-worker-env
      AYATSURI_WORKER_ID: worker-2
    depends_on:
      - coordinator-1
      - coordinator-2
      - coordinator-3
      - scheduler-1
      - scheduler-2
      - scheduler-3
