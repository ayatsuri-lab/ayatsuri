# Example production Docker Compose setup for Ayatsuri with OpenTelemetry, Prometheus, and Grafana
version: "3.9"

services:
  # OpenTelemetry stack for tracing (from docs/features/opentelemetry-testing.md)
  jaeger:
    image: jaegertracing/all-in-one:latest
    networks: [ayatsuri-net]
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC ingest

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - jaeger
    networks: [ayatsuri-net]

  # Prometheus: scrapes metrics from OTel Collector and Ayatsuri server
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
      - ayatsuri-server
    networks: [ayatsuri-net]

  # Ayatsuri control-plane: Coordinator (gRPC) for distributed workers
  ayatsuri-coordinator:
    image: ghcr.io/ayatsuri-lab/ayatsuri:latest
    command: ["ayatsuri", "coordinator"]
    environment:
      # Peer config: insecure by default; set TLS envs if needed
      - AYATSURI_PEER_INSECURE=true
      # Bind and advertise on container IP/DNS so workers can reach it
      - AYATSURI_COORDINATOR_HOST=ayatsuri-coordinator
      - AYATSURI_COORDINATOR_PORT=50055
    ports:
      - "50055:50055"
    volumes:
      - ayatsuri-data:/var/lib/ayatsuri
      - ./dags:/var/lib/ayatsuri/dags:ro
    networks: [ayatsuri-net]

  # Ayatsuri scheduler service (reads DAGs and enqueues runs)
  ayatsuri-scheduler:
    image: ghcr.io/ayatsuri-lab/ayatsuri:latest
    command: ["ayatsuri", "scheduler"]
    environment:
      - AYATSURI_COORDINATOR_HOST=ayatsuri-coordinator
      - AYATSURI_COORDINATOR_PORT=50055
      - AYATSURI_SCHEDULER_PORT=8090
      - AYATSURI_DAGS_DIR=/var/lib/ayatsuri/dags
      # Optional: set timezone, logging, etc
      # - AYATSURI_TZ=UTC
      # - AYATSURI_LOG_FORMAT=json
    depends_on:
      - ayatsuri-coordinator
    ports:
      - "8090:8090" # Scheduler health
    volumes:
      - ayatsuri-data:/var/lib/ayatsuri
      - ./dags:/var/lib/ayatsuri/dags:ro
    networks: [ayatsuri-net]

  # Ayatsuri web UI / API server
  ayatsuri-server:
    image: ghcr.io/ayatsuri-lab/ayatsuri:latest
    command: ["ayatsuri", "server"]
    environment:
      - AYATSURI_COORDINATOR_HOST=ayatsuri-coordinator
      - AYATSURI_COORDINATOR_PORT=50055
      - AYATSURI_HOST=0.0.0.0
      - AYATSURI_PORT=8080
      - AYATSURI_DAGS_DIR=/var/lib/ayatsuri/dags
      # Builtin authentication (RBAC) - CHANGE TOKEN_SECRET IN PRODUCTION
      - AYATSURI_AUTH_MODE=builtin
      # Token secret: auto-generated if not set (persisted to {dataDir}/auth/token_secret)
      # - AYATSURI_AUTH_TOKEN_SECRET=your-secure-random-secret
      # First admin account created via /setup page on first browser visit
      # - AYATSURI_AUTH_TOKEN_TTL=24h        # default is 24h
      # If behind a proxy, set base path
      # - AYATSURI_BASE_PATH=/ayatsuri
    depends_on:
      - ayatsuri-scheduler
      - ayatsuri-coordinator
    ports:
      - "8080:8080"
    volumes:
      - ayatsuri-data:/var/lib/ayatsuri
      - ./dags:/var/lib/ayatsuri/dags:ro
    networks: [ayatsuri-net]

  # Ayatsuri worker (polls coordinator and executes tasks)
  ayatsuri-worker:
    image: ghcr.io/ayatsuri-lab/ayatsuri:latest
    command: ["ayatsuri", "worker"]
    environment:
      - AYATSURI_COORDINATOR_HOST=ayatsuri-coordinator
      - AYATSURI_COORDINATOR_PORT=50055
      # Optional worker tuning and labels
      # - AYATSURI_WORKER_MAX_ACTIVE_RUNS=100
      # - AYATSURI_WORKER_LABELS=region=us-east-1,instance-type=m5.large
      # OTel: point DAGs to collector via per-DAG otel.endpoint: "otel-collector:4317"
    depends_on:
      - ayatsuri-coordinator
    volumes:
      - ayatsuri-data:/var/lib/ayatsuri
      # Workers typically don't need DAG definitions, but sharing is harmless
      - ./dags:/var/lib/ayatsuri/dags:ro
    networks: [ayatsuri-net]

  # Grafana: visualize Prometheus metrics
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [ayatsuri-net]

volumes:
  ayatsuri-data:
    driver: local
  grafana-data:
    driver: local

networks:
  ayatsuri-net:
    driver: bridge
