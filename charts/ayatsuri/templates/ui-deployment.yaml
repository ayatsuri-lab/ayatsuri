apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ayatsuri.fullname" . }}-ui
  labels:
    {{- include "ayatsuri.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      {{- include "ayatsuri.labels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "ayatsuri.labels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      # Disable Kubernetes Service env var injection to avoid overriding
      # ayatsuri config values (e.g., scheduler.port) with Service URLs
      enableServiceLinks: false
      containers:
        - name: ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - ayatsuri
            - server
            - --config
            - /etc/ayatsuri/ayatsuri.yaml
          env:
            - name: AYATSURI_HOME
              value: /data
            - name: AYATSURI_PORT
              value: {{ .Values.ui.service.port | quote }}
{{- with include "ayatsuri.extraEnv" . }}
{{ . | nindent 12 }}
{{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.port }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/ayatsuri
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ayatsuri.fullname" . }}-data
        - name: config
          configMap:
            name: {{ include "ayatsuri.fullname" . }}-config
