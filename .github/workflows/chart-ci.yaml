name: HelmChartCI

on:
  push:
    branches:
      - main
    paths:
      - "charts/ayatsuri/Chart.yaml"
      - "charts/ayatsuri/values.yaml"
      - "charts/ayatsuri/values.schema.json"
      - "charts/ayatsuri/.helmignore"
      - "charts/ayatsuri/README.md"
      - "charts/ayatsuri/RELEASE.md"
      - "charts/ayatsuri/LICENSE*"
      - "charts/ayatsuri/templates/**"
      - "charts/ayatsuri/charts/**"
      - "charts/ayatsuri/crds/**"
      - ".github/workflows/chart-ci.yaml"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - "charts/ayatsuri/Chart.yaml"
      - "charts/ayatsuri/values.yaml"
      - "charts/ayatsuri/values.schema.json"
      - "charts/ayatsuri/.helmignore"
      - "charts/ayatsuri/README.md"
      - "charts/ayatsuri/RELEASE.md"
      - "charts/ayatsuri/LICENSE*"
      - "charts/ayatsuri/templates/**"
      - "charts/ayatsuri/charts/**"
      - "charts/ayatsuri/crds/**"
      - ".github/workflows/chart-ci.yaml"

jobs:
  validate:
    name: Validate Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require chart version bump
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            echo "No base SHA available; skipping chart version check."
            exit 0
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${GITHUB_SHA}" -- \
            charts/ayatsuri/Chart.yaml \
            charts/ayatsuri/values.yaml \
            charts/ayatsuri/values.schema.json \
            charts/ayatsuri/.helmignore \
            charts/ayatsuri/README.md \
            charts/ayatsuri/RELEASE.md \
            charts/ayatsuri/LICENSE* \
            charts/ayatsuri/templates \
            charts/ayatsuri/charts \
            charts/ayatsuri/crds)"

          if [[ -z "${changed_files}" ]]; then
            echo "No packaged chart files changed."
            exit 0
          fi

          old_version="$(git show "${base_sha}:charts/ayatsuri/Chart.yaml" | awk -F': ' '$1=="version"{gsub(/"/,"",$2); print $2; exit}')"
          new_version="$(awk -F': ' '$1=="version"{gsub(/"/,"",$2); print $2; exit}' charts/ayatsuri/Chart.yaml)"

          if [[ -z "${old_version}" || -z "${new_version}" ]]; then
            echo "::error::Unable to read chart version from charts/ayatsuri/Chart.yaml"
            exit 1
          fi

          if [[ "${old_version}" == "${new_version}" ]]; then
            echo "::error::Packaged chart files changed without a chart version bump in charts/ayatsuri/Chart.yaml"
            printf 'Changed packaged files:\n%s\n' "${changed_files}"
            exit 1
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Lint chart
        run: helm lint ./charts/ayatsuri

      - name: Render chart
        run: helm template ayatsuri ./charts/ayatsuri --set persistence.storageClass=nfs-client >/dev/null

      - name: Package chart
        run: |
          mkdir -p /tmp/ayatsuri-chart
          helm package ./charts/ayatsuri --destination /tmp/ayatsuri-chart >/dev/null
